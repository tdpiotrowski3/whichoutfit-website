<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>WhichOutfit</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<style>
body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;color:#0f172a;text-align:center;padding:24px}
.brand{font-weight:800;color:#2563eb;font-size:20px;text-decoration:none;margin-bottom:14px}
h1{font-size:22px;margin:0 0 8px}p{color:#64748b;margin:0 0 20px}
a.btn{background:#2563eb;color:#fff;font-weight:700;text-decoration:none;padding:13px 24px;border-radius:14px}
</style>
</head>
<body>
<a class="brand" href="https://whichoutfit.app">👕 WhichOutfit</a>
<div id="content">
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist.</p>
  <a class="btn" href="https://whichoutfit.app">Go to WhichOutfit</a>
</div>
<script>
// Pretty referral links (/r/CODE) can't map to a static file — bridge them to the
// redeem page, which reads ?code=. Everything else stays a normal 404.
(function(){
  var m = location.pathname.match(/^\/r\/([^\/?#]+)\/?$/);
  if(m){
    var code = decodeURIComponent(m[1]);
    location.replace('/r/?code=' + encodeURIComponent(code));
  }
})();
</script>
</body>
</html>
